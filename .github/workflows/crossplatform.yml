name: Cross-platform compilation test (Ferron 3.x)

on:
  push:
    branches: ["develop-3.x"]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "Cross.toml"
      - "bin/**"
      - "core/**"
      - "entrypoint/**"
      - "modules/**"
      - "types/**"
      - ".github/workflows/crossplatform.yml"
  pull_request:
    branches: ["develop-3.x"]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "Cross.toml"
      - "bin/**"
      - "core/**"
      - "entrypoint/**"
      - "modules/**"
      - "types/**"
      - ".github/workflows/crossplatform.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            command: cross
            smoketest: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            command: cross
            smoketest: true
          - target: i686-unknown-linux-gnu
            runner: ubuntu-latest
            command: cross
          - target: i686-unknown-linux-musl
            runner: ubuntu-latest
            command: cross
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            command: cross
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            command: cross
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            command: cross
          - target: armv7-unknown-linux-musleabihf
            runner: ubuntu-latest
            command: cross
          - target: riscv64gc-unknown-linux-gnu
            runner: ubuntu-latest
            command: cross
          - target: riscv64gc-unknown-linux-musl
            runner: ubuntu-latest
            command: cross
          - target: s390x-unknown-linux-gnu
            runner: ubuntu-latest
            command: cross
          - target: powerpc64le-unknown-linux-gnu
            runner: ubuntu-latest
            command: cross
          - target: x86_64-unknown-freebsd
            runner: ubuntu-latest
            command: cross
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            command: cargo
            smoketest: true
          - target: i686-pc-windows-msvc
            runner: windows-latest
            command: cargo
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            command: cargo
          - target: x86_64-apple-darwin
            runner: macos-latest
            command: cargo
          - target: aarch64-apple-darwin
            runner: macos-latest
            command: cargo
            smoketest: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.target }}"

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: CompileTestFerron3-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: CompileTestFerron3-${{ runner.os }}-${{ matrix.target }}-

      - name: Setup NASM
        if: matrix.runner == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Install Cross
        if: matrix.command == 'cross'
        shell: bash
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall --no-confirm cross --force

      - name: Install bindgen-cli
        if: matrix.command != 'cross'
        shell: bash
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall --no-confirm bindgen-cli --force

      - name: Build binaries
        shell: bash
        run: |
          ${{ matrix.command }} build --target ${{ matrix.target }} --verbose

      # - name: Build binaries (Unix-like)
      #   if: matrix.runner != 'windows-latest'
      #   shell: bash
      #   run: |
      #     make build-dev TARGET="${{ matrix.target }}" CARGO_FINAL="${{ matrix.command }}" CARGO_FINAL_EXTRA_ARGS="--verbose"

      # - name: Build binaries (Windows)
      #   if: matrix.runner == 'windows-latest'
      #   shell: powershell
      #   run: |
      #     $env:TARGET = "${{ matrix.target }}"
      #     $env:CARGO_FINAL = "${{ matrix.command }}"
      #     $env:CARGO_FINAL_EXTRA_ARGS = "--verbose"
      #     powershell -ExecutionPolicy Bypass .\build.ps1 BuildDev

      # - name: Smoke test the binary (Unix-like)
      #   if: matrix.runner != 'windows-latest' && matrix.smoketest == true
      #   shell: bash
      #   run: |
      #     FERRON="$(pwd)/target/${{ matrix.target }}/debug/ferron" bash smoketest/smoketest.sh

      # - name: Smoke test the binary (Windows)
      #   if: matrix.runner == 'windows-latest' && matrix.smoketest == true
