[package]
name = "ferron"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
http = "1"
clap = { version = "4", features = ["derive"] }
serde_json = "1"
tokio-util = "0.7.18"

ferron-core = { path = "../core" }
ferron-http = { path = "../modules/http" }
ferron-config = { path = "../modules/config" }
anyhow = "1.0.102"

[target.'cfg(windows)'.dependencies]
windows-service = "0.7"
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_System_EventLog",
    "Win32_Security",
] }
