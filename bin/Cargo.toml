[package]
name = "ferron"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["rt"] }
clap = { version = "4", features = ["derive"] }
serde_json = "1"
tokio-util = "0.7.18"

ferron-core = { path = "../core" }
ferron-http-server = { path = "../modules/http-server" }
ferron-config-blank = { path = "../modules/config-blank" }
anyhow = "1.0.102"

[target.'cfg(windows)'.dependencies]
windows-service = "0.8"

[target.'cfg(unix)'.dependencies]
nix = { version = "0.31", features = ["fs", "signal", "process"] }
signal-hook = "0.4"
