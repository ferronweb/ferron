[package]
name = "ferron-http-compression"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
async-compression = { version = "0.4", features = ["tokio", "gzip", "brotli", "deflate", "zstd"] }
ferron-core = { path = "../../core" }
ferron-http = { path = "../../types/http", features = ["util"] }
http = "1"
http-body = "1"
http-body-util = "0.1"
bytes = "1"
tokio-util = { version = "0.7", features = ["io"] }
futures-util = "0.3"
typemap_rev = "0.4"
