[package]
name = "ferron-http-response"
version = "3.0.0-alpha.3"
edition = "2021"

[dependencies]
async-trait = "0.1"
fancy-regex = "0.18"
cidr = "0.3"
http = "1"
http-body-util = "0.1.3"
bytes = "1"
rustc-hash = "2"
vibeio-http = { version = "0.3.0", default-features = false, features = ["h1"] }

ferron-core = { path = "../../core" }
ferron-http = { path = "../../types/http" }
ferron-observability = { path = "../../types/observability" }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros"] }
ferron-observability = { path = "../../types/observability" }
typemap_rev = "0.4"
