[package]
name = "ferron-http-server"
version = "3.0.0-alpha.2"
edition = "2021"

[features]
bench = []

[dependencies]
async-channel = "2.5.0"
send_wrapper = "0.6.0"
async-trait = "0.1"
tokio = { version = "1", features = ["rt", "macros"] }
vibeio = { version = "0.2.8", default-features = false, features = ["time"] }
vibeio-http = { version = "0.3.0", default-features = false, features = ["h1", "h1-zerocopy", "h2", "h3"] }
parking_lot = "0.12"
arc-swap = "1.7"
http = "1"
http-body-util = "0.1.3"
bytes = "1.11.1"
tokio-util = "0.7.18"
anyhow = "1.0.102"
rustls = { version = "0.23.37", default-features = false, features = ["std"] }
tokio-rustls = { version = "0.26.4", default-features = false }
socket2 = "0.6.3"
fancy-regex = "0.17"
urlencoding = "2.1.3"
ppp = "2.3.0"
typemap_rev = "0.4"
chrono = "0.4"
quick_cache = "0.6"
xxhash-rust = { version = "0.8", features = ["xxh3"] }
rustc-hash = "2"
h3-quinn = "0.0.10"
quinn = { version = "0.11.8", default-features = false, features = [
    "aws-lc-rs",
    "rustls-aws-lc-rs",
    "runtime-tokio",
] }
oneshot = { version = "0.2.1", features = ["std", "async"] }

ferron-core = { path = "../../core" }
ferron-observability = { path = "../../types/observability" }
ferron-http = { path = "../../types/http", features = ["util"] }
ferron-tls = { path = "../../types/tls" }

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }

[[bench]]
name = "resolver_bench"
harness = false
required-features = ["bench"]

[[bench]]
name = "canonicalize_bench"
harness = false
required-features = ["bench"]

[[bench]]
name = "resolve_file_pipeline_bench"
harness = false
required-features = ["bench"]
