[package]
name = "ferron-http-server"
version = "0.1.0"
edition = "2021"

[features]
bench = []

[dependencies]
async-trait = "0.1"
tokio = { version = "1", features = ["rt", "macros"] }
vibeio = { version = "0.2.6", default-features = false, features = ["time"] }
vibeio-http = { version = "0.3.0", default-features = false, features = ["h1", "h2"] }
parking_lot = "0.12"
arc-swap = "1.7"
http = "1"
http-body-util = "0.1.3"
bytes = "1.11.1"
tokio-util = "0.7.18"
anyhow = "1.0.102"
rustls = { version = "0.23.37", default-features = false, features = ["std"] }
tokio-rustls = { version = "0.26.4", default-features = false }
socket2 = "0.6.3"
fancy-regex = "0.17"
urlencoding = "2.1.3"
smallvec = "1.15.1"
ppp = "2.3.0"

ferron-core = { path = "../../core" }
ferron-observability = { path = "../../types/observability" }
ferron-http = { path = "../../types/http", features = ["util"] }
ferron-tls = { path = "../../types/tls" }

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }

[[bench]]
name = "resolver_bench"
harness = false
required-features = ["bench"]
