[package]
name = "ferron-observability-process-metrics"
version = "3.0.0-alpha.3"
edition = "2021"

[dependencies]
num_cpus = "1"
tokio = { version = "1", features = ["rt", "time", "macros", "sync"] }
tokio-util = "0.7.18"

ferron-core = { path = "../../core" }
ferron-observability = { path = "../../types/observability" }

[target.'cfg(target_os = "linux")'.dependencies]
procfs = "0.18"
