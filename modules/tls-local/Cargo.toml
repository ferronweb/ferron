[package]
name = "ferron-tls-local"
version = "3.0.0-alpha.2"
edition = "2021"

[dependencies]
async-trait = "0.1"
rustls = { version = "0.23.37", default-features = false, features = ["tls12", "std", "aws_lc_rs"] }
rustls-pki-types = "1.14.0"
rcgen = { version = "0.14.1", default-features = false, features = ["crypto", "aws_lc_rs", "pem"] }
dirs = "6.0"
ferron-core = { path = "../../core" }
ferron-tls = { path = "../../types/tls" }
time = "0.3"
x509-parser = "0.18"

[dev-dependencies]
tempfile = "3"
