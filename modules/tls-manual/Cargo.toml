[package]
name = "ferron-tls-manual"
version = "3.0.0-alpha.1"
edition = "2021"

[dependencies]
async-trait = "0.1"
rustls = { version = "0.23.37", default-features = false, features = ["tls12", "std", "aws_lc_rs"] }
#vibeio = { version = "0.2.6", default-features = false }
#tokio-rustls = { version = "0.26.4", default-features = false }

ferron-core = { path = "../../core" }
ferron-ocsp = { path = "../../types/ocsp", optional = true }
ferron-tls = { path = "../../types/tls" }
rustls-pki-types = "1.14.0"
x509-parser = { version = "0.18", optional = true }
der-parser = { version = "10", optional = true }

[features]
default = ["ocsp", "native-certs", "webpki-roots"]
ocsp = ["dep:ferron-ocsp", "dep:x509-parser", "dep:der-parser"]
native-certs = ["ferron-tls/native-certs"]
webpki-roots = ["ferron-tls/webpki-roots"]

[dev-dependencies]
tempfile = "3"
