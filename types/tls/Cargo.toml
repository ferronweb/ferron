[package]
name = "ferron-tls"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
aws-lc-rs = { version = "1", features = ["bindgen"] }
getrandom = "0.4"
rustls = { version = "0.23.37", default-features = false, features = ["std"] }
rustls-pki-types = "1"
vibeio = { version = "0.2.6", default-features = false }
tokio-rustls = { version = "0.26.4", default-features = false }

ferron-core = { path = "../../core" }

[dev-dependencies]
tempfile = "3"
